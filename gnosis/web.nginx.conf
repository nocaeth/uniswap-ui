server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Docker's embedded DNS. Using it via a variable (below) means nginx boots even
  # if the adapter is briefly down and resolves its address at request time instead
  # of caching it at startup (so an adapter restart doesn't strand the proxy).
  resolver 127.0.0.11 ipv6=off valid=10s;

  # Same-origin analytics adapter under /api (the prefix is stripped before proxying):
  #   /api/<connect-service>/<method>  -> adapter ConnectRPC (Explore tables, positions)
  #   /api/v1/graphql                  -> adapter GraphQL (token/pool detail, charts, txs)
  # The app is built with API_BASE_URL_V2_OVERRIDE=https://<host>/api and
  # GRAPHQL_URL_OVERRIDE=https://<host>/api/v1/graphql (see apps/web/.env.production).
  location /api/ {
    set $adapter_upstream http://adapter:8081;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $adapter_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback so client-side routes (/swap, /explore, /positions, …) resolve.
  location / {
    try_files $uri /index.html;
  }
}
