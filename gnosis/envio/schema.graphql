# Envio entity schema for Uniswap V3 on Gnosis.
# Designed to back the fields the UI's Explore/token/pool views need:
# token & pool tables (TVL, volume windows), price/volume/TVL history (charts),
# and a transactions feed. USD figures require a price feed (see EventHandlers.ts).

type Token {
  id: ID! # token address (lowercase)
  symbol: String!
  name: String!
  decimals: Int!
  # Running aggregates (USD where noted)
  totalValueLocked: Float!
  totalValueLockedUSD: Float!
  volumeUSD: Float!
  txCount: Int!
  derivedXDAI: Float! # price in native (xDAI) terms, for USD derivation
}

type Pool {
  id: ID! # pool address (lowercase)
  token0: Token!
  token1: Token!
  feeTier: Int!
  liquidity: BigInt!
  sqrtPriceX96: BigInt!
  tick: Int!
  totalValueLockedUSD: Float!
  volumeUSD: Float!
  feesUSD: Float!
  txCount: Int!
  createdAtTimestamp: Int!
}

# Time-bucketed rollups powering the charts. Write one row per (entity, window).
type PoolDayData {
  id: ID! # `${pool}-${dayStartUnix}`
  pool: Pool!
  date: Int!
  volumeUSD: Float!
  tvlUSD: Float!
  feesUSD: Float!
  sqrtPriceX96: BigInt!
  token0Price: Float!
  token1Price: Float!
}

type PoolHourData {
  id: ID! # `${pool}-${hourStartUnix}`
  pool: Pool!
  periodStartUnix: Int!
  volumeUSD: Float!
  tvlUSD: Float!
  close: Float!
}

type TokenDayData {
  id: ID! # `${token}-${dayStartUnix}`
  token: Token!
  date: Int!
  priceUSD: Float!
  volumeUSD: Float!
  totalValueLockedUSD: Float!
}

type TokenHourData {
  id: ID!
  token: Token!
  periodStartUnix: Int!
  priceUSD: Float!
  volumeUSD: Float!
}

# Transactions feed (swaps/mints/burns) for pool detail + Explore transactions tab.
type Transaction {
  id: ID! # `${txHash}-${logIndex}`
  type: String! # "swap" | "mint" | "burn"
  pool: Pool!
  origin: String! # sender / owner account
  amount0: Float!
  amount1: Float!
  amountUSD: Float!
  timestamp: Int!
  txHash: String!
}

# Single-row protocol totals for the Explore header.
type ProtocolStats {
  id: ID! # "gnosis"
  totalValueLockedUSD: Float!
  volumeUSD: Float!
  txCount: Int!
  poolCount: Int!
}
