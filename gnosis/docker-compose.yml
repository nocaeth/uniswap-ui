# Self-hosted Gnosis-only Uniswap UI stack.
#
#   web      -> the built interface (this repo, apps/web)
#   envio    -> Uniswap V3 Gnosis indexer (gnosis/envio) + its Postgres
#   adapter  -> analytics adapter exposing Uniswap's Data API + GraphQL shapes
#               on top of Envio, so the UI's Explore pages work unchanged
#
# Copy .env.gnosis.example -> .env and fill values before `docker compose up`.
services:
  envio-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: envio
      POSTGRES_PASSWORD: envio
      POSTGRES_DB: envio
    volumes:
      - envio-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U envio']
      interval: 5s
      timeout: 5s
      retries: 10

  envio:
    # Built from the Envio project in gnosis/envio (run `envio init`/`envio codegen`
    # there first; Envio generates its own Dockerfile, or use the envio CLI image).
    build:
      context: ./envio
    depends_on:
      envio-db:
        condition: service_healthy
    environment:
      ENVIO_PG_HOST: envio-db
      ENVIO_PG_PORT: '5432'
      ENVIO_PG_USER: envio
      ENVIO_PG_PASSWORD: envio
      ENVIO_PG_DATABASE: envio
      ENVIO_GNOSIS_RPC_URL: ${ENVIO_GNOSIS_RPC_URL}
    ports:
      - '8080:8080' # Envio's Hasura GraphQL (raw entity API)

  adapter:
    # Translates the UI's Uniswap Data API (ConnectRPC) + GraphQL contract into
    # queries against Envio. See gnosis/adapter/README.md for the endpoints to
    # implement. Replace `build.context` once the adapter service is written.
    build:
      context: ./adapter
    depends_on:
      - envio
    environment:
      ENVIO_GRAPHQL_URL: http://envio:8080/v1/graphql
    ports:
      - '8081:8081'

  web:
    build:
      context: ..
      dockerfile: gnosis/web.Dockerfile
    depends_on:
      - adapter
    environment:
      REACT_APP_WALLET_CONNECT_PROJECT_ID: ${REACT_APP_WALLET_CONNECT_PROJECT_ID}
      API_BASE_URL_V2_OVERRIDE: ${API_BASE_URL_V2_OVERRIDE}
      GRAPHQL_URL_OVERRIDE: ${GRAPHQL_URL_OVERRIDE}
    ports:
      - '3000:80'

volumes:
  envio-pgdata:
